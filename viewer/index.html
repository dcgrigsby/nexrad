<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXRAD Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #app {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
      }

      #file-picker {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <input id="file-picker" type="file" accept=".ply" />
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
